# MBclaw Android 签名密钥配置
# 生产环境请替换为你自己的签名密钥
# keytool -genkey -v -keystore mbclaw.keystore -alias mbclaw -keyalg RSA -keysize 2048 -validity 10000

STORE_FILE=mbclaw.keystore
STORE_PASSWORD=mbclaw2024
KEY_ALIAS=mbclaw
KEY_PASSWORD=mbclaw2024

# Miclaw 内测 API (可选)
MICLAW_BETA_API_KEY=

# 云端服务器地址
MBCLAW_CLOUD_HOST=
MBCLAW_CLOUD_PORT=18789

# DeepSeek 免费 API (本地代理)
DEEPSEEK_PROXY_PORT=8899

# 本地 MBclaw API 端口
MBCLAW_LOCAL_PORT=18790
