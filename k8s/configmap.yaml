apiVersion: v1
kind: ConfigMap
metadata:
  name: mbclaw-config
  namespace: mbclaw
  labels:
    app: mbclaw-lite
data:
  DATA_DIR: "/data"
  LOG_LEVEL: "info"
  HERMES_APPROVAL_THRESHOLDS: "0.05,0.25,0.45,0.70,0.95,1.00"
  I18N_DEFAULT_LOCALE: "zh_CN"
  I18N_SUPPORTED_LOCALES: "zh_CN,en_US,ja_JP"
  CURATOR_STALE_DAYS: "30"
  CURATOR_ARCHIVE_DAYS: "90"
  CURATOR_INTERVAL_HOURS: "24"
  UTOPIA_EVAL_WEIGHT_USER: "0.80"
  UTOPIA_EVAL_WEIGHT_SELF: "0.20"
  UTOPIA_EVAL_THRESHOLD_ACCEPT: "0.50"
  UTOPIA_EVAL_GAP_CONTEST: "0.60"
  UTOPIA_PRIORITY_WEIGHT_URGENCY: "0.40"
  UTOPIA_PRIORITY_WEIGHT_FREQUENCY: "0.35"
  UTOPIA_PRIORITY_WEIGHT_CLARITY: "0.25"
