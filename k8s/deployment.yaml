apiVersion: apps/v1
kind: Deployment
metadata:
  name: mbclaw-lite
  namespace: mbclaw
  labels:
    app: mbclaw-lite
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mbclaw-lite
  template:
    metadata:
      labels:
        app: mbclaw-lite
    spec:
      containers:
      - name: mbclaw
        image: mbclaw-lite:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8011
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: mbclaw-config
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8011
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8011
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: mbclaw-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mbclaw-data-pvc
  namespace: mbclaw
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
